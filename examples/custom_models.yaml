models:
  my-custom-flux:
    repo_id: my-username/my-custom-flux-model
    model_type: flux
    variant: fp16
    parameters:
      num_inference_steps: 20
      guidance_scale: 3.0
      max_sequence_length: 512
    hardware_requirements:
      min_vram_gb: 10
      recommended_vram_gb: 16
      min_ram_gb: 20
      recommended_ram_gb: 32
      disk_space_gb: 12
      supported_devices:
        - CUDA
        - MPS
      performance_notes: Custom FLUX variant optimized for specific use cases
    license_info:
      type: MIT
      requires_agreement: false
      commercial_use: true

  experimental-sd3:
    repo_id: research-org/experimental-sd3-variant
    model_type: sd3
    variant: fp16
    parameters:
      num_inference_steps: 25
      guidance_scale: 4.0
    hardware_requirements:
      min_vram_gb: 8
      recommended_vram_gb: 12
      min_ram_gb: 16
      recommended_ram_gb: 24
      disk_space_gb: 8
      supported_devices:
        - CUDA
        - MPS
        - CPU
      performance_notes: Experimental SD3 model with improved quality
    license_info:
      type: Research License
      requires_agreement: true
      commercial_use: false

  lightweight-sd15:
    repo_id: community/lightweight-sd15
    model_type: sd15
    variant: fp16
    parameters:
      num_inference_steps: 30
      guidance_scale: 6.0
    hardware_requirements:
      min_vram_gb: 2
      recommended_vram_gb: 4
      min_ram_gb: 4
      recommended_ram_gb: 8
      disk_space_gb: 2
      supported_devices:
        - CUDA
        - MPS
        - CPU
      performance_notes: Pruned and optimized SD 1.5 for low-resource environments

  custom-qwen-image:
    repo_id: my-username/my-qwen-image-checkpoint
    model_type: qwen
    parameters:
      num_inference_steps: 30
      true_cfg_scale: 4.0
      # lightning: true   # distilled few-step checkpoint -> defaults 8 steps / true_cfg_scale 1.0
      #                   # (auto-inferred from the name/filename when omitted)
      base_repo: Qwen/Qwen-Image
      pipeline_class: QwenImagePipeline
      # single_file: model.safetensors   # only if the repo has multiple .safetensors
      # text_encoder_repo: someone/uncensored-qwen2.5-vl   # must be Qwen2.5-VL-compatible
      # tokenizer_repo: someone/uncensored-qwen2.5-vl
      text_encoder_class: Qwen2_5_VLForConditionalGeneration
    hardware_requirements:
      min_vram_gb: 40
      recommended_vram_gb: 64
      min_ram_gb: 48
      recommended_ram_gb: 96
      disk_space_gb: 60
      supported_devices:
        - CUDA
        - MPS
      performance_notes: >-
        Single-file Qwen-Image transformer .safetensors, assembled onto base
        Qwen/Qwen-Image components at load time. Driven by true_cfg_scale (not
        guidance_scale). Full-bf16 weights need ~60GB+ unified memory on MPS; a
        quantized checkpoint needs less. Set text_encoder_repo to swap in a
        custom (e.g. uncensored) Qwen2.5-VL-compatible encoder.
    license_info:
      type: Apache 2.0
      requires_agreement: false
      commercial_use: true